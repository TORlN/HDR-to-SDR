name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb ffmpeg  # Install Xvfb and ffmpeg
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage==7.14.1

    - name: Run tests with coverage
      run: |
        xvfb-run -a python -m coverage run -m unittest discover -s test -p '*_test.py'

    - name: Coverage report (fails under threshold in .coveragerc)
      run: |
        python -m coverage report

  typecheck:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies into .venv (pyrightconfig.json resolves imports there)
      run: |
        python -m venv .venv
        ./.venv/bin/python -m pip install --upgrade pip
        ./.venv/bin/python -m pip install -r requirements.txt

    - name: Type-check src/ (must be 0 errors; pyrightconfig.json keeps test/ relaxed)
      run: |
        ./.venv/bin/python -m pyright src